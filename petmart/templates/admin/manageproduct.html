{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Product</title>
    <link rel="stylesheet" href="{% static 'user/userpage.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&">
</head>

<body class="page">
    <header class="topbar">
        <div class="first_nav">
            <div class="brand">
                <img src="{% static 'image/logo.png' %}" alt="PetMart Logo">
                <div class="brand-text">
                    <span class="eyebrow">Admin</span>
                    <h4>Manage Products</h4>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="../addproduct/">Add Product</a></li>
                <li><a href="../viewproduct/">View Product</a></li>
            </ul>
          <a class="ghost-btn" href="../adminpage/"><span class="material-symbols-outlined">arrow_back</span>Go Back</a>  
        </div>
    </header>

    <main class="page-shell">
        <section class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Workboard</p>
                <h1>Streamline catalog updates</h1>
                <p class="subhead">Add new pets, review inventory, and keep pricing fresh.</p>
                <div class="hero-actions">
                    <a href="../addproduct/" class="primary-btn">Add a pet</a>
                    <a href="../viewproduct/" class="ghost-btn">See all pets</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
