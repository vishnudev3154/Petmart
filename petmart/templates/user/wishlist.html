<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>My Wishlist</h2>

{% for item in wishlist_items %}
    <p>
        {{ item.product.name }} -
        ₹{{ item.product.pet_price }}
        <a href="{% url 'removewishlist' item.id %}">Remove</a>
    </p>
{% empty %}
    <p>Your wishlist is empty</p>
{% endfor %}

</body>
</html>
