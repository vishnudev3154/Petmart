{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>
</head>
<body>

<h2>❤️ My Wishlist</h2>

{% if wishlist_items %}
<table border="1" cellpadding="10">
    <tr>
        <th>Pet</th>
        <th>Price</th>
        <th>Action</th>
    </tr>

    {% for item in wishlist_items %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>₹{{ item.product.pet_price }}</td>
        <td>
            <a href="{% url 'removewishlist' item.id %}">Remove</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% else %}
<p>Your wishlist is empty 💔</p>
{% endif %}

<a href="{% url 'userpage' %}">⬅ Back to shop</a>

</body>
</html>
